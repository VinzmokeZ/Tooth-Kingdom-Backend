<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Beatrix: Battle Dentist - Tooth Kingdom</title>
    <style>
        body {
            background: #000;
            color: #cccccc;
            margin: 0px;
            padding: 0px;
            border: 0px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        canvas {
            image-rendering: optimizeSpeed;
            -webkit-interpolation-mode: nearest-neighbor;
            margin: 0px;
            padding: 0px;
            border: 0px;
        }

        :-webkit-full-screen #canvas {
            width: 100%;
            height: 100%;
        }

        div.gm4html5_div_class {
            position: fixed;
            top: 50%;
            left: 50%;
            margin-left: -250px;
            margin-top: -200px;
            padding: 0px;
            border: 0px;
        }

        :-webkit-full-screen {
            width: 100%;
            height: 100%;
        }

        /* ── Splash cover ──────────────────────────────────────────── */
        #splash-cover {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #0c051d url('thumbnail.png') center/contain no-repeat;
            cursor: pointer;

            /* "Press SPACE to start" hint */
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 32px;
        }

        #splash-cover .hint {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 999px;
            color: #fff;
            font-family: sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 10px 24px;
            animation: pulse 1.6s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.45;
            }
        }

        /* Fade-out transition */
        #splash-cover.hiding {
            transition: opacity 0.35s ease;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <!-- ── Splash cover ────────────── -->
    <div id="splash-cover">
        <span class="hint">▶ &nbsp;Press SPACE or Tap to Start</span>
    </div>

    <!-- ── Game canvas ─────────────────────────────────────────── -->
    <div class="gm4html5_div_class" id="gm4html5_div_id">
        <canvas id="canvas" width="500" height="400">
            <p>Your browser doesn't support HTML5 canvas.</p>
        </canvas>
    </div>

    <!-- ── Game code ───────────────────────────────────────────── -->
    <script type="text/javascript" src="html5game/BeatrixBattleDentist_feb_01_sound.js"></script>

    <script>
        (function () {
            var cover = document.getElementById('splash-cover');
            if (!cover) return;

            function dismiss() {
                cover.classList.add('hiding');
                // Also forward the Space keydown into the game so it registers "Press Space"
                var spaceDown = new KeyboardEvent('keydown', {
                    bubbles: true, cancelable: true,
                    keyCode: 32, which: 32, code: 'Space', key: ' '
                });
                document.dispatchEvent(spaceDown);
                window.dispatchEvent(spaceDown);

                setTimeout(function () {
                    if (cover.parentNode) cover.parentNode.removeChild(cover);
                }, 400); // remove after fade completes
            }

            // Keyboard: Space bar
            document.addEventListener('keydown', function (e) {
                if (e.code === 'Space' || e.keyCode === 32) dismiss();
            }, { once: true });

            // Touch / click (for mobile & SPACE button in ExternalGameWrapper)
            cover.addEventListener('touchstart', function (e) {
                e.preventDefault();
                dismiss();
            }, { passive: false });
            cover.addEventListener('click', dismiss);
        })();
    </script>

</body>

</html>
